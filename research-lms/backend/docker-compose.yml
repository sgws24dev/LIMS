  gateway:
    image: ${DOCKER_REGISTRY-}researchlms-gateway
    container_name: research-lms-gateway
    build:
      context: .
      dockerfile: Gateway/ResearchLms.Gateway/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
    ports:
      - "5000:5000"
    depends_on:
      - identity-api
      - institution-api
      - facility-api
      - scheduling-api
      - serviceworkflow-api
      - projects-api
      - inventory-api
      - billing-api
      - communications-api
      - compliance-api
      - content-api
      - aiservices-api
      - training-api

volumes:
  sqlserver-data:
  redis-data:
  rabbitmq-data:
  elasticsearch-data:
  mailhog-data:
  identity-logs:
  institution-logs:
  facility-logs:
  scheduling-logs:
  projects-logs:
  serviceworkflow-logs:
  inventory-logs:
  billing-logs:
  communications-logs:
  compliance-logs:
  content-logs:
  aiservices-logs:
  training-logs:
