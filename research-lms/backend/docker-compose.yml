        condition: service_healthy
    volumes:
      - inventory-logs:/app/logs

  billing-api:
    image: ${DOCKER_REGISTRY-}researchlms-billing
    container_name: research-lms-billing
    build:
      context: .
      dockerfile: Services/Billing/ResearchLms.Billing.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5008
      - ConnectionStrings__BillingDb=Server=sqlserver,1433;Database=ResearchLms_Billing;User Id=sa;Password=ResearchLms@2024!;TrustServerCertificate=True;
    ports:
      - "5008:5008"
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - billing-logs:/app/logs

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: research-lms-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MH_STORAGE: maildir
    volumes:
      - mailhog-data:/maildir

  communications-api:
    image: ${DOCKER_REGISTRY-}researchlms-communications
    container_name: research-lms-communications
    build:
      context: .
      dockerfile: Services/Communications/ResearchLms.Communications.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5010
      - ConnectionStrings__CommunicationsDb=Server=sqlserver,1433;Database=ResearchLms_Communications;User Id=sa;Password=ResearchLms@2024!;TrustServerCertificate=True;
      - RabbitMQ__Host=rabbitmq
    ports:
      - "5010:5010"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - communications-logs:/app/logs

  compliance-api:
    image: ${DOCKER_REGISTRY-}researchlms-compliance
    container_name: research-lms-compliance
    build:
