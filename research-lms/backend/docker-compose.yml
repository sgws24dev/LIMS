services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: research-lms-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "ResearchLms@2024!"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "ResearchLms@2024!" -C -Q "SELECT 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: research-lms-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: research-lms-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: researchlms
      RABBITMQ_DEFAULT_PASS: researchlms
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: research-lms-elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  identity-api:
    image: ${DOCKER_REGISTRY-}researchlms-identity
    container_name: research-lms-identity
    build:
      context: .
      dockerfile: Services/Identity/ResearchLms.Identity.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5001
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=ResearchLms_Identity;User Id=sa;Password=ResearchLms@2024!;TrustServerCertificate=True;
      - RabbitMQ__Host=rabbitmq
      - Elasticsearch__Url=http://elasticsearch:9200
    ports:
      - "5001:5001"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_started
    volumes:
      - identity-logs:/app/logs

  institution-api:
    image: ${DOCKER_REGISTRY-}researchlms-institution
    container_name: research-lms-institution
    build:
      context: .
      dockerfile: Services/Institution/ResearchLms.Institution.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5002
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=ResearchLms_Institution;User Id=sa;Password=ResearchLms@2024!;TrustServerCertificate=True;
      - Elasticsearch__Url=http://elasticsearch:9200
    ports:
      - "5002:5002"
    depends_on:
      sqlserver:
        condition: service_healthy
      elasticsearch:
        condition: service_started
    volumes:
      - institution-logs:/app/logs

  facility-api:
    image: ${DOCKER_REGISTRY-}researchlms-facility
    container_name: research-lms-facility
    build:
      context: .
      dockerfile: Services/Facility/ResearchLms.Facility.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5003
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=ResearchLms_Facility;User Id=sa;Password=ResearchLms@2024!;TrustServerCertificate=True;
      - RabbitMQ__Host=rabbitmq
      - Elasticsearch__Url=http://elasticsearch:9200
    ports:
      - "5003:5003"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_started
    volumes:
      - facility-logs:/app/logs

  scheduling-api:
    image: ${DOCKER_REGISTRY-}researchlms-scheduling
    container_name: research-lms-scheduling
    build:
      context: .
      dockerfile: Services/Scheduling/ResearchLms.Scheduling.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5004
      - ConnectionStrings__SchedulingDb=Server=sqlserver,1433;Database=ResearchLms_Scheduling;User Id=sa;Password=ResearchLms@2024!;TrustServerCertificate=True;
      - RabbitMQ__Host=rabbitmq
      - Elasticsearch__Url=http://elasticsearch:9200
    ports:
      - "5004:5004"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_started
    volumes:
      - scheduling-logs:/app/logs

  serviceworkflow-api:
    image: ${DOCKER_REGISTRY-}researchlms-serviceworkflow
    container_name: research-lms-serviceworkflow
    build:
      context: .
      dockerfile: Services/ServiceWorkflow/ResearchLms.ServiceWorkflow.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5005
      - ConnectionStrings__ServiceWorkflowDb=Server=sqlserver,1433;Database=ResearchLms_ServiceWorkflow;User Id=sa;Password=ResearchLms@2024!;TrustServerCertificate=True;
      - RabbitMQ__Host=rabbitmq
      - Elasticsearch__Url=http://elasticsearch:9200
    ports:
      - "5005:5005"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_started
    volumes:
      - serviceworkflow-logs:/app/logs

  projects-api:
    image: ${DOCKER_REGISTRY-}researchlms-projects
    container_name: research-lms-projects
    build:
      context: .
      dockerfile: Services/Projects/ResearchLms.Projects.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5006
      - ConnectionStrings__ProjectsDb=Server=sqlserver,1433;Database=ResearchLms_Projects;User Id=sa;Password=ResearchLms@2024!;TrustServerCertificate=True;
      - RabbitMQ__Host=rabbitmq
      - Elasticsearch__Url=http://elasticsearch:9200
    ports:
      - "5006:5006"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_started
    volumes:
      - projects-logs:/app/logs

  inventory-api:
    image: ${DOCKER_REGISTRY-}researchlms-inventory
    container_name: research-lms-inventory
    build:
      context: .
      dockerfile: Services/Inventory/ResearchLms.Inventory.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5007
      - ConnectionStrings__InventoryDb=Server=sqlserver,1433;Database=ResearchLms_Inventory;User Id=sa;Password=ResearchLms@2024!;TrustServerCertificate=True;
    ports:
      - "5007:5007"
    depends_on:
